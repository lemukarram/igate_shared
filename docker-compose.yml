version: '3.8'

services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: igate-shared-app:latest
    container_name: igate_shared_app_${APP_ENV:-prod}
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-igate}
      DB_USERNAME: ${DB_USERNAME:-igate}
      DB_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - igate_shared_network
    depends_on:
      - db

  # Nginx Service
  web:
    image: nginx:alpine
    container_name: igate_shared_web_${APP_ENV:-prod}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8001}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - igate_shared_network

  # MySQL Service
  db:
    image: mysql:8.0
    container_name: igate_shared_db_${APP_ENV:-prod}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-igate}
      MYSQL_USER: ${DB_USERNAME:-igate}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - igate_shared_db_data:/var/lib/mysql
    networks:
      - igate_shared_network

networks:
  igate_shared_network:
    driver: bridge

volumes:
  igate_shared_db_data:
    driver: local
