services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: igate-app:latest
    container_name: ${APP_NAME:-igate}_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-igate}
      DB_USERNAME: ${DB_USERNAME:-igate}
      DB_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - public-files:/var/www/public
    networks:
      - igate_network
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: ${APP_NAME:-igate}_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8001}:80"
    volumes:
      - public-files:/var/www/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - igate_network

  db:
    image: mysql:8.0
    container_name: ${APP_NAME:-igate}_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-igate}
      MYSQL_USER: ${DB_USERNAME:-igate}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - igate_db_data:/var/lib/mysql
    networks:
      - igate_network

networks:
  igate_network:
    driver: bridge
  public-files:
    driver: local

volumes:
  igate_db_data:
    driver: local
