<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Workspace | iGate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3da9e4',
                        'primary-dark': '#2a8cc2',
                        'primary-light': '#ebf6fd',
                    }
                }
            }
        }
    </script>
    <style>
        * { border-radius: 0.25rem !important; }
        .rounded-full, .rounded-full * { border-radius: 9999px !important; }
        body { font-family: 'Poppins', sans-serif; font-weight: 300; }
        h1, h2, h3, h4, .font-bold { font-weight: 600 !important; }
    </style>
</head>
<body class="bg-white text-gray-900 overflow-hidden">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 border-r border-gray-100 flex flex-col h-full bg-white">
            <div class="p-6">
                <h1 class="text-2xl font-black text-gray-900 tracking-tighter">iGate.</h1>
            </div>
            <nav class="flex-1 px-3 space-y-1">
                <a href="client-dashboard.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg text-gray-600 hover:bg-gray-50 transition-all">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i><span class="text-sm font-bold">Dashboard</span>
                </a>
                <a href="project-view.html" class="flex items-center space-x-3 px-3 py-2.5 rounded-lg bg-primary-light text-primary font-bold">
                    <i data-lucide="check-square" class="w-4 h-4"></i><span class="text-sm">Active Workspace</span>
                </a>
            </nav>
        </div>

        <!-- Workspace -->
        <main class="flex-1 flex flex-col h-full bg-white overflow-hidden">
            <!-- Top Nav -->
            <div class="px-10 py-6 border-b border-gray-50 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-primary-light text-primary rounded-lg flex items-center justify-center">
                        <i data-lucide="file-check" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black">ZATCA Compliance Integration</h2>
                        <p class="text-[10px] font-black uppercase text-gray-400">Expert HR Solutions • Project #00124</p>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="text-right">
                        <p class="text-[10px] font-black uppercase text-gray-400">Progress</p>
                        <p class="text-sm font-black text-primary">65%</p>
                    </div>
                    <div class="w-48 h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-primary w-[65%]"></div>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex overflow-hidden">
                <!-- Project Details -->
                <div class="flex-1 p-10 overflow-y-auto space-y-8">
                    <div class="grid grid-cols-2 gap-8">
                        <div class="bg-gray-50 p-8 rounded-lg">
                            <h3 class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-4">Milestones</h3>
                            <div class="space-y-4">
                                <div class="flex items-center space-x-4">
                                    <div class="w-6 h-6 bg-primary text-white rounded-md flex items-center justify-center"><i data-lucide="check" class="w-4 h-4"></i></div>
                                    <span class="text-sm font-bold text-gray-700">Initial Portal Setup</span>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <div class="w-6 h-6 bg-primary text-white rounded-md flex items-center justify-center"><i data-lucide="check" class="w-4 h-4"></i></div>
                                    <span class="text-sm font-bold text-gray-700">Phase 1 Integration</span>
                                </div>
                                <div class="flex items-center space-x-4">
                                    <div class="w-6 h-6 bg-white border-2 border-gray-200 rounded-md"></div>
                                    <span class="text-sm font-bold text-gray-400">Phase 2 Certification</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Chat -->
                <div class="w-96 border-l border-gray-100 flex flex-col bg-white">
                    <div class="p-6 border-b border-gray-50 font-black text-[10px] uppercase tracking-widest text-gray-400">Project Chat</div>
                    <div class="flex-1 p-6 overflow-y-auto space-y-4">
                        <div class="bg-gray-50 p-4 rounded-lg rounded-tl-none">
                            <p class="text-xs font-bold text-gray-700">Can you check the latest ZATCA logs?</p>
                        </div>
                        <div class="bg-primary p-4 rounded-lg rounded-tr-none text-white ml-auto max-w-[85%] shadow-lg shadow-primary/10">
                            <p class="text-xs font-bold">Reviewing them now. Updates in 10 mins.</p>
                        </div>
                    </div>
                    <div class="p-6 border-t border-gray-50 bg-gray-50">
                        <textarea placeholder="Message provider..." rows="1" class="w-full p-4 border border-gray-200 rounded-lg text-xs font-bold outline-none resize-none"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
